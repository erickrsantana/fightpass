<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme app-shell" data-page="dashboard">
    <main class="main-content">
        <header class="page-hero page-hero-home">
            <h1>Home</h1>
            <p>Indicadores, alertas de plano e lembretes das proximas aulas.</p>
        </header>
        <div data-flash hidden></div>
        <div id="dashboard-message" hidden></div>

        <div class="metrics-grid">
            <div class="card-white">
                <h3 id="metric-one-label">Aulas agendadas</h3>
                <h2 id="metric-one-value" style="color: var(--primary-blue)">-</h2>
            </div>
            <div class="card-white">
                <h3 id="metric-two-label">Presença</h3>
                <h2 id="metric-two-value" style="color: #10b981">-</h2>
            </div>
            <div class="card-white">
                <h3 id="metric-three-label">Avaliação</h3>
                <h2 id="metric-three-value" style="color: var(--primary-blue)">-</h2>
            </div>
        </div>

        <section id="access-summary" class="card-white" style="margin-top: 24px;" hidden></section>
        <section id="student-notifications" class="card-white" style="margin-top: 24px;" hidden></section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
