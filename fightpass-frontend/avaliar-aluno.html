<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Avaliar Aluno</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme app-shell" data-page="avaliar-aluno">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Avaliar aluno</h1>
            <p style="color: #64748B;">Registre notas de 0 a 10 e comentários sobre o desempenho técnico.</p>
        </header>

        <section class="card-white" style="max-width: 800px;">
            <div id="evaluation-message" hidden></div>
            <form id="evaluation-form">
                <div class="input-group">
                    <label for="student-id">Selecionar aluno</label>
                    <select id="student-id" name="studentId" class="input-field" required></select>
                </div>

                <div class="input-group">
                    <label>Modalidade vinculada</label>
                    <input id="modality-id" name="modalityId" type="hidden">
                    <div id="student-modality-label" class="input-field" style="background: #F1F5F9;">-</div>
                </div>

                <div class="input-group">
                    <label for="score">Nota (0-10)</label>
                    <input id="score" name="score" type="number" class="input-field" step="0.1" min="0" max="10" value="9.0" required>
                </div>

                <div class="input-group">
                    <label for="comment">Comentário</label>
                    <textarea id="comment" name="comment" class="input-field" style="height: 120px; padding: 15px; resize: vertical;" placeholder="Ex.: Excelente evolução técnica e disciplina."></textarea>
                </div>

                <div class="button-row" style="margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="padding: 12px 40px;">Salvar avaliação</button>
                    <button type="button" class="btn-secondary" onclick="history.back()">Cancelar</button>
                </div>
            </form>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
