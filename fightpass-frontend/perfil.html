<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Meu Perfil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme app-shell" data-page="perfil">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Perfil</h1>
            <p style="color: #64748B;">Gerencie suas informações pessoais e a senha da conta.</p>
        </header>

        <section class="card-white">
            <div id="profile-message" hidden></div>
            <form id="profile-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                <div>
                    <h2 style="font-size: 20px; margin-bottom: 20px;">Dados básicos</h2>

                    <div class="input-group">
                        <label for="profile-name">Nome completo ou razão social</label>
                        <input id="profile-name" name="name" type="text" class="input-field" placeholder="Ex.: Dojo Sakura" required>
                    </div>

                    <div class="input-group">
                        <label for="profile-email">Email</label>
                        <input id="profile-email" type="email" class="input-field" disabled>
                    </div>

                    <div class="input-group">
                        <label for="profile-phone">Telefone</label>
                        <input id="profile-phone" name="phone" type="text" class="input-field" placeholder="(11) 99999-9999">
                    </div>
                </div>

                <div>
                    <h2 style="font-size: 20px; margin-bottom: 20px;">Conta</h2>

                    <div class="input-group">
                        <label for="profile-role">Tipo</label>
                        <input id="profile-role" type="text" class="input-field" disabled>
                    </div>

                    <div class="input-group">
                        <label for="profile-document">CPF ou CNPJ</label>
                        <input disabled="disabled" id="profile-document" name="document" type="text" class="input-field" placeholder="000.000.000-00">
                    </div>

                    <div style="margin-top: 30px; display: flex; justify-content: flex-end;">
                        <button type="submit" class="btn-primary" style="width: auto; padding: 12px 40px;">Salvar alterações</button>
                    </div>
                </div>
            </form>
        </section>

        <section class="card-white" style="margin-top: 24px;">
            <h2 style="font-size: 20px; margin-bottom: 20px;">Alterar senha</h2>
            <div id="password-message" hidden></div>
            <form id="password-form" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: end;">
                <div class="input-group">
                    <label for="current-password">Senha atual</label>
                    <input id="current-password" name="currentPassword" type="password" class="input-field" required>
                </div>
                <div class="input-group">
                    <label for="profile-new-password">Nova senha</label>
                    <input id="profile-new-password" name="newPassword" type="password" class="input-field" placeholder="Mínimo de 8 caracteres" required minlength="8">
                </div>
                <div class="input-group">
                    <label for="profile-confirm-password">Confirmar nova senha</label>
                    <input id="profile-confirm-password" name="confirmPassword" type="password" class="input-field" required minlength="8">
                </div>
                <button type="submit" class="btn-primary" style="width: auto; padding: 12px 40px;">Alterar senha</button>
            </form>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
