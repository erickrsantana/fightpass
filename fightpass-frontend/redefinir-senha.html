<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Recuperação de Senha</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .recovery-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #F8FAFC;
            padding: 20px;
        }

        .recovery-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid #E2E8F0;
        }
    </style>
</head>
<body class="light-theme" data-page="recuperar-senha">
    <div class="recovery-container">
        <main class="recovery-card">
            <header style="margin-bottom: 30px; text-align: center;">
                <div class="logo" style="margin-bottom: 15px;">FightPass</div>
                <h1 style="font-size: 22px; color: #1E293B; margin-bottom: 10px;">Recuperação de senha</h1>
                <p style="color: #64748B; font-size: 14px;">Informe o email cadastrado ou use o token recebido para definir uma nova senha.</p>
            </header>

            <div id="recovery-message" hidden></div>

            <form id="forgot-form">
                <div class="input-group">
                    <label for="forgot-email">Email</label>
                    <input id="forgot-email" name="email" type="email" class="input-field" placeholder="Digite seu email" required>
                </div>
                <button type="submit" class="btn-primary">Verificar</button>
            </form>

            <form id="reset-form" hidden>
                <div class="input-group">
                    <label for="new-password">Nova senha</label>
                    <input id="new-password" name="password" type="password" class="input-field" placeholder="Mínimo de 8 caracteres" required minlength="8">
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirmar nova senha</label>
                    <input id="confirm-password" name="confirmPassword" type="password" class="input-field" placeholder="Repita a nova senha" required minlength="8">
                </div>
                <button type="submit" class="btn-primary">Redefinir senha</button>
            </form>

            <div style="margin-top: 25px; font-size: 14px; text-align: center;">
                <a href="login.html" style="color: #64748B;">Voltar para o login</a>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
