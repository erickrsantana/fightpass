<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Minhas Aulas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme app-shell" data-page="minhas-aulas">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Minhas aulas</h1>
            <p style="color: #64748B;">Gerencie seus agendamentos e presenças confirmadas.</p>
        </header>

        <div id="my-classes-message" hidden></div>

        <div class="card-white">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Dia</th>
                        <th>Hora</th>
                        <th>Modalidade</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="bookings-table"></tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
