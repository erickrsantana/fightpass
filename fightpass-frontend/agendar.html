<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Agendar Aula</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme app-shell" data-page="agendar">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Agendar aula</h1>
            <p style="color: #64748B;">Escolha uma turma disponível e confirme agendamentos simples ou recorrentes.</p>
        </header>

        <div id="booking-message" hidden></div>

        <div style="display: grid; grid-template-columns: 1.4fr 1fr; gap: 30px; align-items: start;">
            <section class="card-white">
                <h2 style="font-size: 20px; margin-bottom: 25px;">Novo agendamento</h2>

                <form id="booking-form">
                    <div class="input-group">
                        <label for="class-schedule-id">Turma e horário</label>
                        <select id="class-schedule-id" class="input-field" required></select>
                    </div>

                    <div class="input-group">
                        <label for="booking-date">Data</label>
                        <input id="booking-date" type="date" class="input-field" required>
                    </div>

                    <div style="margin: 20px 0; display: flex; flex-direction: column; gap: 10px;">
                        <label style="display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer;">
                            <input id="is-recurring" type="checkbox" style="width: 18px; height: 18px;">
                            Repetir semanalmente
                        </label>
                        <div id="recurring-fields" class="input-group" hidden>
                            <label for="end-date">Repetir até</label>
                            <input id="end-date" type="date" class="input-field">
                        </div>
                    </div>

                    <button class="btn-primary" type="submit" style="margin-top: 10px;">Confirmar</button>
                </form>
            </section>

            <section class="card-white">
                <h2 style="font-size: 18px; margin-bottom: 20px;">Prévia da grade</h2>
                <table style="width: 100%; border-collapse: collapse; min-width: auto;">
                    <thead>
                        <tr>
                            <th>Dia</th>
                            <th>Hora</th>
                            <th>Modalidade</th>
                            <th>Instituição</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-preview"></tbody>
                </table>
            </section>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
