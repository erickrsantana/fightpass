<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Planos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme app-shell" data-page="planos">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Planos FightPass</h1>
            <p style="color: #64748B;">Contratação demonstrativa com Pix e boleto fictícios para o protótipo acadêmico.</p>
        </header>

        <div id="plans-message" hidden></div>

        <section id="current-access" class="card-white" style="margin-bottom: 24px;"></section>

        <section class="card-white" style="margin-bottom: 24px;">
            <div class="input-group" style="max-width: 280px;">
                <label for="payment-method">Forma de pagamento</label>
                <select id="payment-method" class="input-field">
                    <option value="pix">Pix</option>
                    <option value="boleto">Boleto</option>
                </select>
            </div>
        </section>

        <section id="plans-list" class="plans-grid"></section>

        <section id="payment-result" class="card-white" style="margin-top: 24px;" hidden></section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
